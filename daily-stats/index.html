<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ИТОГИ ДНЯ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0f">
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>📊 ИТОГИ ДНЯ</h1>
      <button id="settingsBtn" class="secondary" style="width: auto; padding: 8px 16px;">⚙️ Настройки</button>
    </div>
    <div id="loadingIndicator" style="display: none; text-align: center;">⏳ Загрузка...</div>
    <div class="tabs">
      <button id="tabInput" class="active">Ввод данных</button>
      <button id="tabReports">Просмотр отчётов</button>
    </div>

    <!-- Панель ввода данных -->
    <div id="inputPanel" class="panel">
      <div class="form-row">
        <div class="form-group">
          <label>Дата отчёта</label>
          <input type="date" id="reportDate">
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="employeeSelect">
            <option value="">-- Выберите имя --</option>
          </select>
        </div>
        <div class="form-group" id="stageSelectGroup" style="display: none;">
          <label>Этап</label>
          <select id="stageSelect">
            <option value="">-- Выберите этап --</option>
          </select>
        </div>
      </div>

      <div class="orders-section">
        <h3>Заказы (можно добавить несколько)</h3>
        <div id="ordersContainer"></div>
        <div class="actions">
          <button id="addOrderBtn" class="secondary">+ Добавить заказ</button>
          <button id="loadFromScanBtn" class="secondary">📥 Загрузить из Kairo-Scan</button>
        </div>
      </div>

      <div class="total-section">
        <label for="totalMetric">Общий итог (метраж / отверстия / упаковки)</label>
        <input type="number" id="totalMetric" step="any" placeholder="Автоматически суммируется">
      </div>

      <button id="saveBtn" class="primary">💾 Сохранить итоги</button>
    </div>

    <!-- Панель просмотра отчётов -->
    <div id="reportsPanel" class="panel" style="display:none;">
      <div class="filters">
        <div class="form-group">
          <label>Дата с</label>
          <input type="date" id="filterDateFrom">
        </div>
        <div class="form-group">
          <label>Дата по</label>
          <input type="date" id="filterDateTo">
        </div>
        <div class="form-group">
          <label>Этап</label>
          <select id="filterStage">
            <option value="all">Все</option>
            <option value="pila">Пила</option>
            <option value="kromka">Кромка</option>
            <option value="prisadka">Присадка</option>
            <option value="upakovka">Упаковка</option>
            <option value="hdf">Пила ХДФ</option>
          </select>
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="filterEmployee">
            <option value="">Все</option>
          </select>
        </div>
        <div class="actions">
          <button id="applyFilters" class="secondary">Применить</button>
          <button id="exportExcel" class="secondary">📎 Экспорт в Excel</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="reportsTable">
          <thead>
            <tr>
              <th>Дата</th>
              <th>Этап</th>
              <th>Сотрудник</th>
              <th>Заказы</th>
              <th>Кол-во заказов</th>
              <th>Итого</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Модальное окно настроек -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="close">&times;</span>
        <h2>Управление сотрудниками</h2>
      </div>
      <div class="modal-body">
        <p>Здесь можно скрыть ненужные имена и объединить несколько имён в одно (например, Макс и Максим → Макс).</p>
        <div id="employeesSettingsList"></div>
        <div class="actions" style="margin-top: 20px;">
          <button id="saveSettingsBtn" class="primary">Сохранить настройки</button>
          <button id="resetSettingsBtn" class="secondary">Сбросить все настройки</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
