<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ИТОГИ ДНЯ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0f">
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>📊 ИТОГИ ДНЯ</h1>
      <button id="settingsBtn" class="secondary" style="width: auto; padding: 8px 16px;">⚙️ Настройки</button>
    </div>
    <div id="loadingIndicator" style="display: none; text-align: center;">⏳ Загрузка...</div>
    <div class="tabs">
      <button id="tabInput" class="active">Ввод данных</button>
      <button id="tabReports">Просмотр отчётов</button>
    </div>

    <!-- Панель ввода данных -->
    <div id="inputPanel" class="panel">
      <div class="form-row">
        <div class="form-group">
          <label>Дата</label>
          <input type="date" id="reportDate">
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="employeeSelect">
            <option value="">-- Выберите имя --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Этап</label>
          <select id="stageSelect">
            <option value="">-- Выберите этап --</option>
            <option value="pila">Пила</option>
            <option value="kromka">Кромка</option>
            <option value="prisadka">Присадка</option>
            <option value="upakovka">Упаковка</option>
            <option value="hdf">Пила ХДФ</option>
          </select>
        </div>
      </div>

      <div class="stats-section">
        <div class="form-group">
          <label>Количество заказов</label>
          <input type="number" id="orderCount" step="1" min="0" value="0">
        </div>
        <div class="form-group">
          <label>Метраж / кол-во упаковок</label>
          <input type="number" id="totalAmount" step="any" value="0">
        </div>
      </div>

      <button id="saveBtn" class="primary">💾 Сохранить итоги</button>
    </div>

    <!-- Панель просмотра отчётов -->
    <div id="reportsPanel" class="panel" style="display:none;">
      <div class="filters">
        <div class="form-group">
          <label>Месяц</label>
          <input type="month" id="reportMonth">
        </div>
        <div class="form-group">
          <label>Этап</label>
          <select id="filterStage">
            <option value="all">Все этапы</option>
            <option value="pila">Пила</option>
            <option value="kromka">Кромка</option>
            <option value="prisadka">Присадка</option>
            <option value="upakovka">Упаковка</option>
            <option value="hdf">Пила ХДФ</option>
          </select>
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="filterEmployee">
            <option value="">Все сотрудники</option>
          </select>
        </div>
        <div class="actions">
          <button id="applyFilters" class="secondary">Показать</button>
          <button id="exportExcel" class="secondary">📎 Экспорт в Excel</button>
        </div>
      </div>
      <div class="table-wrapper">
        <div id="matrixContainer"></div>
      </div>
    </div>
  </div>

  <!-- Модальное окно настроек -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="close">&times;</span>
        <h2>Управление сотрудниками</h2>
      </div>
      <div class="modal-body">
        <p>Здесь можно скрыть ненужные имена и объединить несколько имён в одно.</p>
        <div id="employeesSettingsList"></div>
        <div class="actions" style="margin-top: 20px;">
          <button id="saveSettingsBtn" class="primary">Сохранить настройки</button>
          <button id="resetSettingsBtn" class="secondary">Сбросить все настройки</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
